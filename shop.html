<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Jun's Agrifarm Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-brand { font-family: 'Cinzel', serif; }
        .modal { display: none; position: fixed; z-index: 200; inset: 0; background: rgba(0,0,0,0.8); backdrop-blur: 5px; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-[#FDFCF8]">
    <div id="navbar-placeholder"></div>

    <main class="min-h-screen pt-24 pb-12">
<script>
    function toggleMenu() {
        const menu = document.getElementById('nav-menu');
        menu.classList.toggle('translate-x-full');
    }
</script>
    
    <section class="py-24 max-w-7xl mx-auto px-6">
        <div id="product-list" class="grid md:grid-cols-3 gap-12">
            <p class="text-stone-400 font-bold uppercase tracking-widest animate-pulse">
                Menjemput hasil bumi Jambuwer...
            </p>
        </div>
    </section>
    
    <div id="purchaseModal" class="modal">
        <div class="bg-white p-10 max-w-md w-full mx-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-stone-400 hover:text-black">✕</button>
            <h2 id="modalTitle" class="font-serif text-2xl text-emerald-950 mb-2">Pilih Metode Pesan</h2>
            <p class="text-stone-400 text-xs mb-8 uppercase tracking-widest">Produk: <span id="productName" class="text-emerald-900 font-bold"></span></p>
            
            <div class="space-y-4">
                <a id="waLink" href="#" target="_blank" class="flex items-center justify-between bg-emerald-100 p-4 border border-emerald-200 hover:bg-emerald-200 transition group">
                    <div>
                        <span class="block font-bold text-emerald-900 text-sm">WhatsApp (Retail)</span>
                        <span class="text-[10px] text-emerald-700 uppercase tracking-widest">Respon Cepat & Sat-set</span>
                    </div>
                    <svg class="w-5 h-5 text-emerald-600 group-hover:translate-x-1 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M12 19l7-7-7-7"></path></svg>
                </a>

                <a id="emailLink" href="#" class="flex items-center justify-between bg-stone-100 p-4 border border-stone-200 hover:bg-stone-200 transition group">
                    <div>
                        <span class="block font-bold text-stone-900 text-sm">Email (Partai Besar)</span>
                        <span class="text-[10px] text-stone-600 uppercase tracking-widest">Format Formal & Invoice</span>
                    </div>
                    <svg class="w-5 h-5 text-stone-600 group-hover:translate-x-1 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M12 19l7-7-7-7"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-[#0f1110] text-stone-500 py-16 px-6 text-center border-t border-white/5">
        <p class="text-[10px] tracking-[0.4em] uppercase">Jun's Agrifarm • Legasi Jambuwer</p>
    </footer>

    <script>
        const modal = document.getElementById('purchaseModal');
        const pNameDisplay = document.getElementById('productName');
        const waLink = document.getElementById('waLink');
        const emailLink = document.getElementById('emailLink');

        function openModal(name) {
            pNameDisplay.innerText = name;
            
            // Format Pesan WA
            const waMsg = encodeURIComponent(`Halo Jun's Agrifarm, saya tertarik memesan produk: ${name}. Mohon info ketersediaan stoknya.`);
            waLink.href = `https://wa.me/6281380018067?text=${waMsg}`;
            
            // Format Email
            const emailSubject = encodeURIComponent(`Inquiry Pesanan Produk: ${name}`);
            const emailBody = encodeURIComponent(`Kepada Jun's Agrifarm,\n\nSaya tertarik untuk memesan produk ${name} dalam jumlah tertentu. Mohon kirimkan daftar harga terbaru (Quotation) dan prosedur pengirimannya.\n\nTerima kasih.`);
            emailLink.href = `mailto:junsagrifarm@gmail.com?subject=${emailSubject}&body=${emailBody}`;

            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }
    // 2. KONEKSI KE GUDANG DATA JUN'S AGRIFARM (IIBUYYIFYFBRCOYBPTXE)
    const supabaseUrl = 'https://iibuyyifyfbrcoybptxe.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpYnV5eWlmeWZicmNveWJwdHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTQwMjAsImV4cCI6MjA4OTg5MDAyMH0.qO5KDs1fN2mlQ5RRY8vnRWvOIG6iAztxDun361mv1dk';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 3. FUNGSI AMBIL PRODUK DARI JAMBUWER
    async function loadProducts() {
        const container = document.getElementById('product-list');

        try {
            // Ambil semua kolom dari tabel 'products'
            const { data, error } = await _supabase
                .from('products')
                .select('*')
                .order('id', { ascending: false });

            if (error) throw error;

            // Jika Gudang Kosong
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 border-2 border-dashed border-stone-200 text-center">
                        <p class="text-stone-400 text-xs uppercase tracking-[0.5em] italic">Stok produk sedang dipersiapkan di Jambuwer.</p>
                    </div>`;
                return;
            }

            // Gambar Kartu Produk Satu Per Satu
            container.innerHTML = ''; 
            data.forEach(item => {
                container.innerHTML += `
                    <div class="group border border-stone-100 p-6 bg-white hover:border-amber-700/30 hover:shadow-2xl transition-all duration-500">
                        <div class="aspect-square bg-stone-50 overflow-hidden mb-6 relative">
                            <img src="${item.image_url || 'https://images.unsplash.com/photo-1582408921715-18e7806365c1?q=80&w=800'}" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale hover:grayscale-0">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 text-[8px] font-black uppercase tracking-widest text-emerald-950 border border-stone-100">
                                ${item.category || 'Agrifarm'}
                            </div>
                        </div>
                        <h3 class="font-serif text-2xl mb-2 text-emerald-950">${item.name}</h3>
                        <p class="text-stone-500 text-[10px] mb-4 leading-relaxed uppercase tracking-[0.2em] h-12 overflow-hidden italic">
                            ${item.description || 'Produk unggulan hasil tanah Jambuwer.'}
                        </p>
                        <div class="flex justify-between items-center border-t border-stone-50 pt-6">
                            <p class="font-bold text-amber-700 text-sm font-mono tracking-tighter">${item.price || 'Price TBA'}</p>
                            <button onclick="openModal('${item.name}')" class="text-[9px] font-black uppercase tracking-[0.2em] border-b-2 border-emerald-950 pb-1 hover:text-amber-700 hover:border-amber-700 transition">
                                Pesan Sekarang →
                            </button>
                        </div>
                    </div>
                `;
            });

        } catch (err) {
            console.error("Gagal Ambil Data:", err.message);
            container.innerHTML = `
                <div class="col-span-full p-10 bg-red-50 border border-red-100 text-center">
                    <p class="text-red-800 text-xs font-bold uppercase tracking-widest">Waduh Bree, Database Lagi Ngambek!</p>
                    <p class="text-[10px] text-red-400 mt-2 italic">${err.message}</p>
                </div>`;
        }
    }

    // Jalankan Pas Halaman Siap
    document.addEventListener('DOMContentLoaded', loadProducts);
</script>
        </main>

    <div id="footer-placeholder"></div>

    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
</body>
</html>
